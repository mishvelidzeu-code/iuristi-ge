<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <title>შესვლა და რეგისტრაცია | იურისტი</title>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <script src="config.js" onerror="this.remove()"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/auth.js"></script>
</head>
<body>
  <div data-header></div>
  <main id="main" class="auth-shell auth-page">
    <section class="auth-panel auth-panel-single">
      <section class="card auth-card" aria-labelledby="auth-title">
        <div class="auth-card-head">
          <div>
            <div class="eyebrow">ავტორიზაცია</div>
            <h2 id="auth-title">კეთილი იყოს თქვენი დაბრუნება</h2>
          </div>
        </div>

        <div class="tabs auth-tabs" role="tablist" aria-label="ავტორიზაციის ტიპი">
          <button class="btn tab" data-mode="login" type="button" aria-selected="true">შესვლა</button>
          <button class="btn secondary tab" data-mode="signup" type="button" aria-selected="false">რეგისტრაცია</button>
        </div>

        <form id="auth-form" class="auth-form">
          <div class="field hidden" id="name-field">
            <label for="full-name">სახელი და გვარი</label>
            <input id="full-name" autocomplete="name" placeholder="მაგ. ნინო მაისურაძე">
          </div>

          <div class="field hidden" id="phone-field">
            <label for="phone">ტელეფონის ნომერი</label>
            <input id="phone" type="tel" autocomplete="tel" placeholder="მაგ. 599 12 34 56">
          </div>

          <div class="field">
            <label for="email">ელფოსტა</label>
            <input id="email" type="email" autocomplete="email" required placeholder="you@example.com">
          </div>

          <div class="field">
            <label for="password">პაროლი</label>
            <input id="password" type="password" autocomplete="current-password" minlength="8" required placeholder="მინ. 8 სიმბოლო">
          </div>

          <div class="field hidden" id="confirm-password-field">
            <label for="confirm-password">გაიმეორეთ პაროლი</label>
            <input id="confirm-password" type="password" autocomplete="new-password" minlength="8" placeholder="იგივე პაროლი">
          </div>

          <p class="status" id="auth-status" role="alert"></p>

          <button class="btn auth-submit" id="auth-submit">შესვლა</button>
          <button class="btn secondary auth-reset" id="reset-password" type="button">პაროლის აღდგენა</button>
        </form>
      </section>
    </section>
  </main>
</body>
</html>
