<!doctype html><html lang="ka"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex"><title>ავტორიზაცია | იურისტი</title><link rel="stylesheet" href="css/styles.css"><script src="config.js" onerror="this.remove()"></script><script type="module" src="js/app.js"></script><script type="module" src="js/auth.js"></script></head><body><div data-header></div><main id="main" class="auth-shell"><section class="card auth-card"><div class="tabs"><button class="btn tab" data-mode="login" aria-selected="true">შესვლა</button><button class="btn secondary tab" data-mode="signup" aria-selected="false">რეგისტრაცია</button></div><h1>კეთილი იყოს თქვენი დაბრუნება</h1><form id="auth-form"><div class="field hidden" id="name-field"><label for="full-name">სახელი და გვარი</label><input id="full-name" autocomplete="name"></div><div class="field"><label for="email">ელფოსტა</label><input id="email" type="email" required></div><div class="field"><label for="password">პაროლი</label><input id="password" type="password" minlength="8" required></div><p class="status" id="auth-status" role="alert"></p><button class="btn" id="auth-submit">შესვლა</button> <button class="btn secondary" id="reset-password" type="button">პაროლის აღდგენა</button></form></section></main></body></html>
